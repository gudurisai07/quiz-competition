<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Register – Quiz Fest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(ellipse at top, #0f172a 0%, #030712 60%); }
        .glass { background: rgba(15,23,42,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(99,102,241,0.2); }
        .btn-gradient { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .btn-gradient:hover { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
        input:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass rounded-3xl p-10 w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">🎯</div>
            <h1 class="text-3xl font-black text-white">Create Admin</h1>
            <p class="text-gray-400 mt-1 text-sm">Register your admin account to control Quiz Fest</p>
        </div>

        {% if error %}
        <div class="mb-5 p-3 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-sm text-center">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="flex flex-col gap-4">
            {% csrf_token %}
            <div>
                <label class="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-2 block">Admin Name</label>
                <input type="text" name="name" placeholder="e.g. quiz_master" required
                    class="w-full bg-slate-800/60 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none transition-all" />
            </div>
            <div>
                <label class="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-2 block">Password</label>
                <input type="password" name="password" placeholder="Choose a secure password" required
                    class="w-full bg-slate-800/60 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none transition-all" />
            </div>
            <button type="submit" class="btn-gradient mt-2 py-4 rounded-xl font-black text-white text-lg shadow-lg transition-all hover:scale-[1.02] active:scale-95">
                🚀 Register Admin
            </button>
        </form>

        <p class="text-center text-gray-500 text-sm mt-6">
            Already have an account?
            <a href="/api/auth/login/" class="text-indigo-400 font-bold hover:text-indigo-300 transition">Login here</a>
        </p>
    </div>
</body>
</html>
